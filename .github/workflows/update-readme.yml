name: update-readme
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-readme
permissions:
  contents: write
jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Generate README
        run: |
          curl -sS https://abdxdev.vercel.app/api/readme > README.new

          if grep -q "FUNCTION_INVOCATION_TIMEOUT" README.new; then
            echo "FUNCTION_INVOCATION_TIMEOUT detected in response. Skipping README update."
            rm -f README.new
            exit 0
          fi

          mv README.new README.md
      - name: Commit updated README
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi
          git commit -m "Update README.md"
          git push origin main
